<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>*{
                padding: 0;margin: 0;box-sizing: border-box;

        }
.slider{
        width: 100%;
        height: 450px;
        background-image: url("image/image14.avif");
        background-repeat: no repeat;
        background-size: cover;
        background-position: center;
        animation: karthik 12s linear   infinite normal;
}

@keyframes karthik{
        0%{
                background-image: url("image/image43.jpg");

        }
        35%{
                background-image: url("image/image45.jpg");
        }
        75%{ background-image: url("image/image44.jpg");}
        100%{background-image: url("image/image47.jpg");}
}



        </style>
</head>
<body>
        <div class="slider">
        

        </div>
        
        
</body>
